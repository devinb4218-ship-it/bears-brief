<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --navy: #0B162A;
    --navy-panel: #101D38;
    --panel-line: #22314F;
    --orange: #C83803;
    --orange-bright: #E8621F;
    --cream: #F2EFE9;

    --tag-work: #1E3A6E;

  .date-row { display: flex; align-items: center; margin-bottom: 20px; }
  .arrow-btn { padding: 6px 14px; color: var(--orange-bright); font-size: 24px; font-weight: 700; background: none; border: none; cursor: pointer; }
  .date-center { flex: 1; text-align: center; background: none; border: none; color: var(--cream); cursor: pointer; }
  .date-text { font-size: 15px; font-weight: 600; }
  .today-hint { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .empty-text { color: var(--muted); font-size: 13px; font-style: italic; }

  .task-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-top: 1px solid var(--panel-line); }
  .task-row:first-of-type { border-top: none; }
  .checkbox { width: 20px; height: 20px; border-radius: 5px; border: 1.5px solid var(--muted); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .checkbox.checked { background: var(--orange); border-color: var(--orange); }
  .checkbox.checked::after { content: "✓"; font-size: 11px; color: var(--navy); font-weight: 700; }
  .task-body { flex: 1; min-width: 0; }
  .task-text { font-size: 14px; font-weight: 500; }
  .task-text.done { text-decoration: line-through; color: var(--muted); }
  .tag { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; padding: 2px 8px; border-radius: 100px; color: var(--cream); margin-top: 4px; }
  .link-btn { color: var(--orange-bright); font-size: 12px; font-weight: 600; background: none; border: none; cursor: pointer; padding: 4px; }
  .remove-btn { color: var(--muted); font-size: 18px; background: none; border: none; cursor: pointer; padding: 0 4px; }

  .add-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .add-row select, .add-row input {
    background: #0a1224; border: 1px solid var(--panel-line); border-radius: 8px;
    color: var(--cream); font-family: 'Inter', sans-serif; font-size: 13px; padding: 9px 10px;

  .add-row input { flex: 1; min-width: 120px; }
  .add-row button { background: var(--orange); border: none; color: var(--cream); font-weight: 700; font-size: 13px; padding: 9px 14px; border-radius: 8px; cursor: pointer; }

  .google-btn {

  .footer-note { font-size: 11px; color: var(--muted); text-align: center; margin-top: 20px; line-height: 1.6; }

<div class="wrap">
  <div class="tabbar">
    <button class="tab-btn active" data-tab="today">Today</button>
    <button class="tab-btn" data-tab="business">Business</button>
    <button class="tab-btn" data-tab="projects">Projects</button>
  </div>

  <div class="eyebrow">EISENHOWER PRIORITY BRIEF</div>

  <div id="today-tab"></div>
  <div id="business-tab" style="display:none;"></div>
  <div id="projects-tab" style="display:none;"></div>

  <div class="footer-note">Built on Claude. Saved to your home screen, running from the web.</div>
</div>

<script>
// ---------------- Shared constants ----------------
const TAGS = [
  { key: 'work', label: 'Work', color: 'var(--tag-work)' },
  { key: 'personal', label: 'Personal', color: 'var(--tag-personal)' },
  { key: 'kids', label: 'Kids', color: 'var(--tag-kids)' },
  { key: 'wife', label: 'Wife', color: 'var(--tag-wife)' },
];
const QUADS = [
  { key: 'q1', label: 'Do First', sub: 'Urgent + Important', accent: true },
  { key: 'q2', label: 'Schedule', sub: 'Important, Not Urgent', accent: true },
  { key: 'q3', label: 'Delegate', sub: 'Urgent, Not Important', accent: false },
  { key: 'q4', label: 'Eliminate', sub: 'Not Urgent, Not Important', accent: false },
];
const PROJECT_COLORS = { SGS: 'var(--proj-sgs)', Inland: 'var(--proj-inland)', App: 'var(--proj-app)' };

function dateKey(d) { return d.toISOString().slice(0, 10); }
function formatDisplayDate(d) { return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }); }
function emptyDay() { return { q1: [], q2: [], q3: [], q4: [] }; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ---------------- Tab switching ----------------
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['today', 'business', 'projects'].forEach(t => {
      document.getElementById(t + '-tab').style.display = (t === btn.dataset.tab) ? 'block' : 'none';
    });
    if (btn.dataset.tab === 'business') loadBusinessTab();
  });
});

// ================= TODAY TAB =================
let currentDate = new Date();
let day = emptyDay();

function loadDay() {
  const raw = localStorage.getItem('bears-brief:' + dateKey(currentDate));
  day = raw ? JSON.parse(raw) : emptyDay();
  renderToday();
}
function saveDay() {
  localStorage.setItem('bears-brief:' + dateKey(currentDate), JSON.stringify(day));
}
function goToDay(offset) {
  currentDate.setDate(currentDate.getDate() + offset);
  loadDay();
}
function goToToday() { currentDate = new Date(); loadDay(); }
function toggleDone(q, i) { day[q][i].done = !day[q][i].done; saveDay(); renderToday(); }
function removeTask(q, i) { day[q].splice(i, 1); saveDay(); renderToday(); }
function moveTask(fromQ, i, toQ) {
  if (fromQ === toQ) return;
  const t = day[fromQ].splice(i, 1)[0];
  day[toQ].push(t);
  saveDay(); renderToday();
}
function addTask() {
  const text = document.getElementById('new-task-text').value.trim();
  if (!text) return;
  const q = document.getElementById('new-task-quad').value;
  const tag = document.getElementById('new-task-tag').value;
  day[q].push({ text, tag, done: false });
  saveDay();
  document.getElementById('new-task-text').value = '';
  renderToday();
}

function renderToday() {
  const isToday = dateKey(currentDate) === dateKey(new Date());
  let html = `
    <div class="date-row">
      <button class="arrow-btn" onclick="goToDay(-1)">‹</button>
      <button class="date-center" onclick="goToToday()">
        <div class="date-text">${formatDisplayDate(currentDate)}</div>
        ${!isToday ? '<div class="today-hint">tap to jump to today</div>' : ''}
      </button>
      <button class="arrow-btn" onclick="goToDay(1)">›</button>
    </div>
  `;

  QUADS.forEach(q => {
    html += `<div class="quad ${q.accent ? '' : 'dim'}">
      <div class="quad-label">${q.label}</div>
      <div class="quad-sub">${q.sub}</div>`;
    if (day[q.key].length === 0) html += `<div class="empty-text">Nothing here yet.</div>`;
    day[q.key].forEach((t, i) => {
      const tagInfo = TAGS.find(tg => tg.key === t.tag) || TAGS[0];
      html += `
        <div class="task-row">
          <div class="checkbox ${t.done ? 'checked' : ''}" onclick="toggleDone('${q.key}',${i})"></div>
          <div class="task-body">
            <div class="task-text ${t.done ? 'done' : ''}">${esc(t.text)}</div>
            <span class="tag" style="background:${tagInfo.color}">${tagInfo.label}</span>
          </div>
          <select onchange="moveTask('${q.key}',${i},this.value)" style="background:transparent;color:var(--orange-bright);border:none;font-size:12px;">
            <option value="">move</option>
            ${QUADS.filter(qq => qq.key !== q.key).map(qq => `<option value="${qq.key}">${qq.label}</option>`).join('')}
          </select>
          <button class="remove-btn" onclick="removeTask('${q.key}',${i})">×</button>
        </div>`;
    });
    html += `</div>`;
  });

  html += `
    <div class="add-row">
      <select id="new-task-quad">${QUADS.map(q => `<option value="${q.key}">${q.label}</option>`).join('')}</select>
      <select id="new-task-tag">${TAGS.map(t => `<option value="${t.key}">${t.label}</option>`).join('')}</select>
      <input type="text" id="new-task-text" placeholder="Add a task...">
      <button onclick="addTask()">Add</button>
    </div>
  `;

  document.getElementById('today-tab').innerHTML = html;
  document.getElementById('new-task-text').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
}

// ================= BUSINESS TAB =================
let googleToken = null;
let tokenClient = null;

function initGoogle() {
  if (!window.google || GOOGLE_CLIENT_ID.includes('YOUR-WEB-CLIENT-ID')) return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/tasks.readonly',
    callback: (resp) => {
      if (resp.access_token) {
        googleToken = resp.access_token;
        sessionStorage.setItem('bears-brief:google-token', googleToken);
        loadBusinessTab();
      }
    },
  });
  const saved = sessionStorage.getItem('bears-brief:google-token');
  if (saved) googleToken = saved;
}

function signInGoogle() {
  if (tokenClient) tokenClient.requestAccessToken();
}
function signOutGoogle() {
  googleToken = null;
  sessionStorage.removeItem('bears-brief:google-token');
  loadBusinessTab();
}

async function fetchStageSummary(table) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=stage`, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
    });
    if (!res.ok) throw new Error('status ' + res.status);
    const rows = await res.json();
    const counts = {};
    rows.forEach(r => { const s = r.stage || 'Unstaged'; counts[s] = (counts[s] || 0) + 1; });
    return { ok: true, counts, total: rows.length };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

async function fetchTodayEvents() {
  if (!googleToken) return { ok: false, error: 'signed_out' };
  try {
    const now = new Date();
    const start = new Date(now); start.setHours(0,0,0,0);
    const end = new Date(now); end.setHours(23,59,59,999);
    const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${start.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime`;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${googleToken}` } });
    if (!res.ok) throw new Error('status ' + res.status);
    const data = await res.json();
    return { ok: true, events: data.items || [] };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

async function fetchUnreadCount() {
  if (!googleToken) return { ok: false, error: 'signed_out' };
  try {
    const res = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/labels/UNREAD', {
      headers: { Authorization: `Bearer ${googleToken}` }
    });
    if (!res.ok) throw new Error('status ' + res.status);
    const data = await res.json();
    return { ok: true, count: data.messagesUnread };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

async function fetchGoogleTasks() {
  if (!googleToken) return { ok: false, error: 'signed_out' };
  try {
    const res = await fetch('https://tasks.googleapis.com/tasks/v1/lists/@default/tasks?showCompleted=false&showHidden=false', {
      headers: { Authorization: `Bearer ${googleToken}` }
    });
    if (!res.ok) throw new Error('status ' + res.status);
    const data = await res.json();
    return { ok: true, tasks: data.items || [] };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

function addGoogleTaskToToday(text, quad) {
  loadDay(); // ensure `day` reflects current stored state before mutating
  day[quad].push({ text, tag: 'work', done: false });
  saveDay();
  document.querySelector('.tab-btn[data-tab="today"]').click();
  renderToday();
}

async function loadBusinessTab() {
  const el = document.getElementById('business-tab');
  el.innerHTML = `<h1>Your day, at a glance.</h1><div class="empty-text">Loading...</div>`;

  const googleConfigured = !GOOGLE_CLIENT_ID.includes('YOUR-WEB-CLIENT-ID');
  let googleHtml = '';
  if (!googleConfigured) {
    googleHtml = `<div class="card"><div class="empty-text">Add your real Google Web client ID in config.js to connect Calendar and Gmail.</div></div>`;
  } else if (!googleToken) {
    googleHtml = `<div class="card"><button class="google-btn" onclick="signInGoogle()">Sign in with Google</button></div>`;
  } else {
    const [events, unread, tasks] = await Promise.all([fetchTodayEvents(), fetchUnreadCount(), fetchGoogleTasks()]);
    googleHtml = `<div class="signed-in-row"><span>Connected to Google</span><button onclick="signOutGoogle()">Sign out</button></div>`;
    googleHtml += `<div class="card"><div class="quad-label" style="margin-bottom:10px;">On the calendar</div>`;
    if (events.ok && events.events.length) {
      events.events.forEach(ev => {
        const time = ev.start.dateTime ? new Date(ev.start.dateTime).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }) : 'All day';
        googleHtml += `<div class="stage-row"><span>${esc(ev.summary || 'Untitled event')}</span><span class="stage-count">${time}</span></div>`;
      });
    } else {
      googleHtml += `<div class="empty-text">Nothing scheduled today.</div>`;
    }
    googleHtml += `</div>`;
    googleHtml += `<div class="card"><div class="quad-label">Inbox</div><div class="stage-row"><span>Unread</span><span class="stage-count">${unread.ok ? unread.count : '—'}</span></div></div>`;

    googleHtml += `<div class="card"><div class="quad-label" style="margin-bottom:10px;">From Google Tasks</div>`;
    if (tasks.ok && tasks.tasks.length) {
      tasks.tasks.forEach(t => {
        const safeTitle = esc(t.title || 'Untitled task').replace(/'/g, "\\'");
        googleHtml += `
          <div class="task-row">
            <div class="task-body">
              <div class="task-text">${esc(t.title || 'Untitled task')}</div>
            </div>
            <select onchange="if(this.value) addGoogleTaskToToday('${safeTitle}', this.value)" style="background:transparent;color:var(--orange-bright);border:none;font-size:12px;">
              <option value="">add to...</option>
              ${QUADS.map(q => `<option value="${q.key}">${q.label}</option>`).join('')}
            </select>
          </div>`;
      });
    } else {
      googleHtml += `<div class="empty-text">Nothing in your default Google Tasks list right now.</div>`;
    }
    googleHtml += `</div>`;
  }

  const [sgs, inland] = await Promise.all([fetchStageSummary(SGS_TABLE), fetchStageSummary(INLAND_TABLE)]);
  function renderCrm(label, result) {
    let h = `<div class="card"><div class="quad-label" style="margin-bottom:10px;">${label}</div>`;
    if (result.ok) {
      h += `<div class="quad-sub" style="margin-bottom:8px;">${result.total} total leads, by stage</div>`;
      Object.entries(result.counts).forEach(([stage, count]) => {
        h += `<div class="stage-row"><span>${esc(stage)}</span><span class="stage-count">${count}</span></div>`;
      });
    } else {
      h += `<div class="empty-text">Could not load — check config.js.</div>`;
    }
    h += `</div>`;
    return h;
  }

  el.innerHTML = `<h1>Your day, at a glance.</h1>${googleHtml}${renderCrm('Slip Guard Solutions', sgs)}${renderCrm('Inland Xpedited', inland)}`;
}

// ================= PROJECTS TAB =================
const SEED_DATE = '2026-07-21';
const DEFAULT_PROJECT_TASKS = {
  q1: [
    { text: 'Confirm slipguardsolutions.com domain transfer to Cloudflare completed', project: 'SGS', done: false },
    { text: 'Deploy Inland CRM to Cloudflare Pages (rename to index.html, connect domain)', project: 'Inland', done: false },
    { text: 'Verify SPF/DKIM/DMARC on inlandxmile.com before sending outbound waves', project: 'Inland', done: false },
    { text: 'Add real Google Web client ID for Calendar/Gmail sign-in', project: 'App', done: false },
  ],
  q2: [
    { text: 'Decide on purchasing quality leads for the outbound agent', project: 'SGS', done: false },
    { text: 'Refine outbound cold emails; explore video integration + subject line tricks', project: 'SGS', done: false },
    { text: 'Fix stage filter to hide empty columns, not just empty cards', project: 'SGS', done: false },
    { text: 'Build the Inland outbound super agent (clone of SGS agent for route verticals)', project: 'Inland', done: false },
    { text: 'Triage the 804 raw leads down to the best ~80, enrich via Apollo/Perplexity', project: 'Inland', done: false },
    { text: 'Lock down Supabase RLS policies on route_leads/route_documents tables', project: 'Inland', done: false },
    { text: 'Set up the Mac text-message export pipeline', project: 'App', done: false },
    { text: 'Decide on public release scope once personal use proves it out', project: 'App', done: false },
    { text: 'Deploy this site to Cloudflare Pages for real daily use', project: 'App', done: false },
  ],
  q3: [],
  q4: [
    { text: 'Build CRM mobile app or home-screen shortcut', project: 'SGS', done: false },
    { text: 'Clean up CRM mobile formatting', project: 'SGS', done: false },
    { text: 'Add Siri shortcut support (needs a native app, later phase)', project: 'App', done: false },
  ],
};

function loadProjects() {
  const raw = localStorage.getItem('bears-brief:projects');
  return raw ? JSON.parse(raw) : DEFAULT_PROJECT_TASKS;
}
function saveProjects(p) { localStorage.setItem('bears-brief:projects', JSON.stringify(p)); }
function toggleProject(q, i) {
  const p = loadProjects();
  p[q][i].done = !p[q][i].done;
  saveProjects(p);
  renderProjects();
}

function renderProjects() {
  const projects = loadProjects();
  let html = `<h1>Projects with Claude.</h1>
    <div class="snapshot-note">Snapshot as of ${SEED_DATE}, sorted Eisenhower-style. Ask Claude to refresh this list in chat, then paste the update back into this file.</div>`;

  QUADS.forEach(q => {
    html += `<div class="quad ${q.accent ? '' : 'dim'}">
      <div class="quad-label">${q.label}</div>
      <div class="quad-sub">${q.sub}</div>`;
    const tasks = projects[q.key] || [];
    if (tasks.length === 0) html += `<div class="empty-text">Nothing here right now.</div>`;
    tasks.forEach((t, i) => {
      html += `
        <div class="task-row">
          <div class="checkbox ${t.done ? 'checked' : ''}" onclick="toggleProject('${q.key}',${i})"></div>
          <div class="task-body">
            <div class="task-text ${t.done ? 'done' : ''}">${esc(t.text)}</div>
            <span class="tag" style="background:${PROJECT_COLORS[t.project] || 'var(--muted)'}">${t.project}</span>
          </div>
        </div>`;
    });
    html += `</div>`;
  });

  document.getElementById('projects-tab').innerHTML = html;
}

// ================= INIT =================
window.addEventListener('load', () => {
  loadDay();
  renderProjects();
