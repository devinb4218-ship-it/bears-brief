<style>

<body>
<div class="wrap">
  <div class="tabbar">
    <button class="tab-btn active" data-tab="today">Today</button>
    <button class="tab-btn" data-tab="business">Business</button>
    <button class="tab-btn" data-tab="projects">Projects</button>
    <button class="tab-btn" data-tab="history">History</button>
  </div>

  <div class="eyebrow">EISENHOWER PRIORITY BRIEF</div>

  <div id="business-tab" style="display:none;"></div>
  <div id="projects-tab" style="display:none;"></div>

  <div class="footer-note">Built on Claude. Saved to your home screen, running from the web.</div>

<script>
// ---------------- Shared constants ----------------
const TAGS = [
  { key: 'work', label: 'Work', color: 'var(--tag-work)' },
  { key: 'personal', label: 'Personal', color: 'var(--tag-personal)' },
  { key: 'kids', label: 'Kids', color: 'var(--tag-kids)' },
  { key: 'wife', label: 'Wife', color: 'var(--tag-wife)' },
];
const QUADS = [
  { key: 'q1', label: 'Do First', sub: 'Urgent + Important', accent: true },
  { key: 'q2', label: 'Schedule', sub: 'Important, Not Urgent', accent: true },
  { key: 'q3', label: 'Delegate', sub: 'Urgent, Not Important', accent: false },
  { key: 'q4', label: 'Eliminate', sub: 'Not Urgent, Not Important', accent: false },
];
const PROJECT_COLORS = { SGS: 'var(--proj-sgs)', Inland: 'var(--proj-inland)', App: 'var(--proj-app)' };

function dateKey(d) { return d.toISOString().slice(0, 10); }
function formatDisplayDate(d) { return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }); }
function emptyDay() { return { q1: [], q2: [], q3: [], q4: [] }; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ---------------- Tab switching ----------------
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['today', 'business', 'projects', 'history'].forEach(t => {
      document.getElementById(t + '-tab').style.display = (t === btn.dataset.tab) ? 'block' : 'none';
    });
    if (btn.dataset.tab === 'business') loadBusinessTab();
    if (btn.dataset.tab === 'history') loadHistoryTab();
  });
});

// ================= SHARED STORAGE (Supabase-backed, syncs across devices) =================
async function stateGet(key, fallback) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/bears_brief_state?key=eq.${encodeURIComponent(key)}&select=value`, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
    });
    if (!res.ok) throw new Error('status ' + res.status);
    const rows = await res.json();
    return rows.length ? rows[0].value : fallback;
  } catch (e) {
    console.error('stateGet failed, using local cache', e);
    const raw = localStorage.getItem('bears-brief:cache:' + key);
    return raw ? JSON.parse(raw) : fallback;
  }
}
async function stateSet(key, value) {
  localStorage.setItem('bears-brief:cache:' + key, JSON.stringify(value));
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/bears_brief_state?on_conflict=key`, {
      method: 'POST',
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json',
        Prefer: 'resolution=merge-duplicates',
      },
      body: JSON.stringify({ key, value, updated_at: new Date().toISOString() }),
    });
  } catch (e) {
    console.error('stateSet failed, saved locally only', e);
  }
}

// ================= TODAY TAB =================
let currentDate = new Date();
let day = emptyDay();

async function loadDay() {
  day = await stateGet('day:' + dateKey(currentDate), emptyDay());
  renderToday();
}
async function saveDay() {
  await stateSet('day:' + dateKey(currentDate), day);
}
async function goToDay(offset) {
  currentDate.setDate(currentDate.getDate() + offset);
  await loadDay();
}
async function goToToday() { currentDate = new Date(); await loadDay(); }
async function jumpToDate(dateStr) {
  if (!dateStr) return;
  const [y, m, d] = dateStr.split('-').map(Number);
  currentDate = new Date(y, m - 1, d);
  await loadDay();
}
async function logCompletion(text, tag, source) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/bears_brief_completed_log`, {
      method: 'POST',
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ task_text: text, tag, source, completed_date: dateKey(new Date()) }),
    });
  } catch (e) {
    console.error('logCompletion failed', e);
  }
}

async function toggleDone(q, i) {
  const wasDone = day[q][i].done;
  day[q][i].done = !wasDone;
  renderToday();
  await saveDay();
  if (!wasDone) await logCompletion(day[q][i].text, day[q][i].tag, 'today');
}
async function removeTask(q, i) { day[q].splice(i, 1); renderToday(); await saveDay(); }
async function moveTask(fromQ, i, toQ) {
  if (fromQ === toQ) return;
  const t = day[fromQ].splice(i, 1)[0];
  day[toQ].push(t);
  renderToday();
  await saveDay();
}
async function loadUnscheduled() {
  return await stateGet('unscheduled', { q1: [], q2: [], q3: [], q4: [] });
}
async function saveUnscheduled(u) {
  await stateSet('unscheduled', u);
}
async function toggleUnscheduledItem(q, i) {
  const u = await loadUnscheduled();
  const wasDone = u[q][i].done;
  u[q][i].done = !wasDone;
  await saveUnscheduled(u);
  if (!wasDone) await logCompletion(u[q][i].text, u[q][i].tag, 'backlog');
  renderToday();
}

function spreadAcrossWeek(list, offset) {
  if (offset < 1 || offset > 6) return [];
  return list.filter((_, idx) => idx % 6 === offset - 1);
}

async function addTask() {
  const text = document.getElementById('new-task-text').value.trim();
  if (!text) return;
  const q = document.getElementById('new-task-quad').value;
  const tag = document.getElementById('new-task-tag').value;
  const time = document.getElementById('new-task-time').value || '';
  const noDate = document.getElementById('new-task-nodate').checked;

  if (noDate) {
    const u = await loadUnscheduled();
    u[q].push({ text, tag, time, done: false });
    await saveUnscheduled(u);
  } else {
    day[q].push({ text, tag, time, done: false });
    await saveDay();
  }

  document.getElementById('new-task-text').value = '';
  document.getElementById('new-task-time').value = '';
  renderToday();
}

function daysBetweenDateOnly(a, b) {
  const da = new Date(a.getFullYear(), a.getMonth(), a.getDate());
  const db = new Date(b.getFullYear(), b.getMonth(), b.getDate());
  return Math.round((db - da) / 86400000);
}

// Pulls in Projects items relevant to the selected day:
// - viewing today: all "Do First" project items show up here too
// - viewing 1-6 days out: a slice of the "Schedule" backlog is spread across the week
//   round-robin, so the whole list doesn't dump onto one day
function getAutoProjectItems(projects, offset) {
  const result = { q1: [], q2: [] };
  if (offset === 0) {
    result.q1 = (projects.q1 || []).map((t, i) => ({ ...t, projIndex: i })).filter(t => !t.done);
  } else {
    const backlog = (projects.q2 || []).map((t, i) => ({ ...t, projIndex: i })).filter(t => !t.done);
    result.q2 = spreadAcrossWeek(backlog, offset);
  }
  return result;
}

// Same idea, for your own unscheduled tasks (added with "no specific day"):
// Do First shows today only; Schedule/Delegate/Eliminate spread across the week.
function getAutoUnscheduledItems(unscheduled, offset) {
  const result = { q1: [], q2: [], q3: [], q4: [] };
  if (offset === 0) {
    result.q1 = (unscheduled.q1 || []).map((t, i) => ({ ...t, uIndex: i })).filter(t => !t.done);
  }
  ['q2', 'q3', 'q4'].forEach(qk => {
    const list = (unscheduled[qk] || []).map((t, i) => ({ ...t, uIndex: i })).filter(t => !t.done);
    result[qk] = spreadAcrossWeek(list, offset);
  });
  return result;
}

async function toggleAutoProjectItem(projQuad, projIndex) {
  await toggleProject(projQuad, projIndex);
  renderToday();
}

async function renderToday() {
  const isToday = dateKey(currentDate) === dateKey(new Date());
  const offset = daysBetweenDateOnly(new Date(), currentDate);

  let html = `
    <div class="date-row">
      <button class="arrow-btn" onclick="goToDay(-1)">‹</button>
      <button class="date-center" onclick="goToToday()">
        <div class="date-text">${formatDisplayDate(currentDate)}</div>
        ${!isToday ? '<div class="today-hint">tap to jump to today</div>' : ''}
      </button>
      <button class="arrow-btn" onclick="goToDay(1)">›</button>
    </div>
    <div style="margin-bottom:18px;">
      <input type="date" id="jump-date-input" value="${dateKey(currentDate)}" onchange="jumpToDate(this.value)"
        style="width:100%;background:var(--navy-panel);border:1px solid var(--panel-line);border-radius:8px;color:var(--cream);padding:9px 10px;font-family:'Inter',sans-serif;font-size:13px;">
    </div>
  `;

  // On the calendar — real events with real times, for whichever day is selected
  if (googleToken) {
    const events = await fetchEventsForDate(currentDate);
    html += `<div class="card"><div class="quad-label" style="margin-bottom:10px;">On the calendar</div>`;
    if (events.ok && events.events.length) {
      events.events.forEach(ev => {
        const time = ev.start.dateTime
          ? new Date(ev.start.dateTime).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
          : 'All day';
        html += `<div class="stage-row"><span>${esc(ev.summary || 'Untitled event')}</span><span class="stage-count">${time}</span></div>`;
      });
    } else {
      html += `<div class="empty-text">Nothing scheduled.</div>`;
    }
    html += `</div>`;
  } else {
    html += `<div class="card"><div class="empty-text">Sign in with Google on the Business tab to see your calendar here too.</div></div>`;
  }

  const projects = await loadProjects();
  const unscheduled = await loadUnscheduled();
  const autoItems = getAutoProjectItems(projects, offset);
  const autoU = getAutoUnscheduledItems(unscheduled, offset);

  QUADS.forEach(q => {
    const autoP = autoItems[q.key] || [];
    const autoUn = autoU[q.key] || [];
    const manual = day[q.key] || [];
    if (manual.length === 0 && autoP.length === 0 && autoUn.length === 0) {
      html += `<div class="quad ${q.accent ? '' : 'dim'}">
        <div class="quad-label">${q.label}</div>
        <div class="quad-sub">${q.sub}</div>
        <div class="empty-text">Nothing here yet.</div>
      </div>`;
      return;
    }

    html += `<div class="quad ${q.accent ? '' : 'dim'}">
      <div class="quad-label">${q.label}</div>
      <div class="quad-sub">${q.sub}</div>`;

    // sort manual tasks: timed ones first (chronological), then untimed
    const sortedManual = manual.map((t, i) => ({ ...t, _i: i })).sort((a, b) => {
      if (a.time && b.time) return a.time.localeCompare(b.time);
      if (a.time) return -1;
      if (b.time) return 1;
      return 0;
    });

    sortedManual.forEach(t => {
      const i = t._i;
      const tagInfo = TAGS.find(tg => tg.key === t.tag) || TAGS[0];
      html += `
        <div class="task-row">
          <div class="checkbox ${t.done ? 'checked' : ''}" onclick="toggleDone('${q.key}',${i})"></div>
          <div class="task-body">
            <div class="task-text ${t.done ? 'done' : ''}">${t.time ? `<strong>${esc(t.time)}</strong> — ` : ''}${esc(t.text)}</div>
            <span class="tag" style="background:${tagInfo.color}">${tagInfo.label}</span>
          </div>
          <select onchange="moveTask('${q.key}',${i},this.value)" style="background:transparent;color:var(--orange-bright);border:none;font-size:12px;">
            <option value="">move</option>
            ${QUADS.filter(qq => qq.key !== q.key).map(qq => `<option value="${qq.key}">${qq.label}</option>`).join('')}
          </select>
          <button class="remove-btn" onclick="removeTask('${q.key}',${i})">×</button>
        </div>`;
    });

    autoP.forEach(t => {
      const projColor = PROJECT_COLORS[t.project] || 'var(--muted)';
      html += `
        <div class="task-row">
          <div class="checkbox" onclick="toggleAutoProjectItem('${q.key}',${t.projIndex})"></div>
          <div class="task-body">
            <div class="task-text">${esc(t.text)}</div>
            <span class="tag" style="background:${projColor}">${esc(t.project)} · Projects</span>
          </div>
        </div>`;
    });

    autoUn.forEach(t => {
      const tagInfo = TAGS.find(tg => tg.key === t.tag) || TAGS[0];
      html += `
        <div class="task-row">
          <div class="checkbox" onclick="toggleUnscheduledItem('${q.key}',${t.uIndex})"></div>
          <div class="task-body">
            <div class="task-text">${t.time ? `<strong>${esc(t.time)}</strong> — ` : ''}${esc(t.text)}</div>
            <span class="tag" style="background:${tagInfo.color}">${tagInfo.label} · Backlog</span>
          </div>
        </div>`;
    });

    html += `</div>`;
  });

  html += `
    <div class="add-row">
      <select id="new-task-quad">${QUADS.map(q => `<option value="${q.key}">${q.label}</option>`).join('')}</select>
      <select id="new-task-tag">${TAGS.map(t => `<option value="${t.key}">${t.label}</option>`).join('')}</select>
      <input type="time" id="new-task-time" style="max-width:110px;">
      <input type="text" id="new-task-text" placeholder="Add a task...">
      <button onclick="addTask()">Add</button>
    </div>
    <label style="display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);margin:-10px 0 20px;">
      <input type="checkbox" id="new-task-nodate">
      No specific day — auto-place this across the week for me
    </label>
  `;

  document.getElementById('today-tab').innerHTML = html;
  document.getElementById('new-task-text').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
}

// ================= BUSINESS TAB =================
let googleToken = null;
let tokenClient = null;

function initGoogle() {
  if (!window.google || GOOGLE_CLIENT_ID.includes('YOUR-WEB-CLIENT-ID')) return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/tasks.readonly',
    callback: (resp) => {
      if (resp.access_token) {
        googleToken = resp.access_token;
        const expiresAt = Date.now() + (Number(resp.expires_in || 3600) * 1000);
        localStorage.setItem('bears-brief:google-token', googleToken);
        localStorage.setItem('bears-brief:google-token-expires', String(expiresAt));
        loadBusinessTab();
      }
    },
  });
  const saved = localStorage.getItem('bears-brief:google-token');
  const expiresAt = Number(localStorage.getItem('bears-brief:google-token-expires') || 0);
  if (saved && Date.now() < expiresAt) {
    googleToken = saved; // still valid, no need to sign in again
  } else {
    localStorage.removeItem('bears-brief:google-token');
    localStorage.removeItem('bears-brief:google-token-expires');
  }
}

function signInGoogle() {
  if (tokenClient) tokenClient.requestAccessToken();
}
function signOutGoogle() {
  googleToken = null;
  localStorage.removeItem('bears-brief:google-token');
  localStorage.removeItem('bears-brief:google-token-expires');
  loadBusinessTab();
}

async function fetchStageSummary(table) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?select=stage`, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
    });
    if (!res.ok) throw new Error('status ' + res.status);
    const rows = await res.json();
    const counts = {};
    rows.forEach(r => { const s = r.stage || 'Unstaged'; counts[s] = (counts[s] || 0) + 1; });
    return { ok: true, counts, total: rows.length };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

async function fetchEventsForDate(dateObj) {
  if (!googleToken) return { ok: false, error: 'signed_out' };
  try {
    const start = new Date(dateObj); start.setHours(0,0,0,0);
    const end = new Date(dateObj); end.setHours(23,59,59,999);
    const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${start.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime`;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${googleToken}` } });
    if (!res.ok) throw new Error('status ' + res.status);
    const data = await res.json();
    return { ok: true, events: data.items || [] };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}
async function fetchTodayEvents() { return fetchEventsForDate(new Date()); }

async function fetchUnreadCount() {
  if (!googleToken) return { ok: false, error: 'signed_out' };
  try {
    let count = 0;
    let pageToken = '';
    let pages = 0;
    do {
      const url = 'https://gmail.googleapis.com/gmail/v1/users/me/messages?q=' +
        encodeURIComponent('is:unread in:inbox category:primary') +
        '&maxResults=100' + (pageToken ? `&pageToken=${pageToken}` : '');
      const res = await fetch(url, { headers: { Authorization: `Bearer ${googleToken}` } });
      if (!res.ok) throw new Error('status ' + res.status);
      const data = await res.json();
      count += (data.messages || []).length;
      pageToken = data.nextPageToken || '';
      pages++;
    } while (pageToken && pages < 10); // cap at 1000 messages, plenty for an unread count
    return { ok: true, count };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

async function fetchGoogleTasks() {
  if (!googleToken) return { ok: false, error: 'signed_out' };
  try {
    const listsRes = await fetch('https://tasks.googleapis.com/tasks/v1/users/@me/lists', {
      headers: { Authorization: `Bearer ${googleToken}` }
    });
    if (!listsRes.ok) throw new Error('lists status ' + listsRes.status);
    const listsData = await listsRes.json();
    const lists = listsData.items || [];

    const allTasks = [];
    for (const list of lists) {
      const res = await fetch(
        `https://tasks.googleapis.com/tasks/v1/lists/${list.id}/tasks?showCompleted=false&showHidden=false`,
        { headers: { Authorization: `Bearer ${googleToken}` } }
      );
      if (!res.ok) continue;
      const data = await res.json();
      (data.items || []).forEach(t => allTasks.push({ ...t, listTitle: list.title }));
    }
    return { ok: true, tasks: allTasks };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

      h += `<div class="quad-sub" style="margin-bottom:8px;">${result.total} total leads, by stage</div>`;
      Object.entries(result.counts).forEach(([stage, count]) => {
        h += `<div class="stage-row"><span>${esc(stage)}</span><span class="stage-count">${count}</span></div>`;
      });

async function fetchCompletedLog(searchText, searchDate) {
  let url = `${SUPABASE_URL}/rest/v1/bears_brief_completed_log?select=*&order=completed_date.desc,created_at.desc&limit=200`;
  if (searchText) url += `&task_text=ilike.*${encodeURIComponent(searchText)}*`;
  if (searchDate) url += `&completed_date=eq.${searchDate}`;
  try {
    const res = await fetch(url, { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } });
    if (!res.ok) throw new Error('status ' + res.status);
    return { ok: true, rows: await res.json() };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

function formatLogDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

async function loadHistoryTab(searchText, searchDate) {
  searchText = searchText || '';
  searchDate = searchDate || '';
  const result = await fetchCompletedLog(searchText, searchDate);
  const el = document.getElementById('history-tab');

  let html = `<h1>Everything you've finished.</h1>
    <div class="add-row" style="margin-bottom:20px;">
      <input type="text" id="history-search" placeholder="Search completed tasks..." value="${esc(searchText)}" style="flex:2;">
      <input type="date" id="history-date-input" value="${esc(searchDate)}" style="flex:1;">
      <button onclick="applyHistoryFilters()">Search</button>
      <button onclick="loadHistoryTab('','')" style="background:var(--panel-line);">Clear</button>
    </div>`;

  if (!result.ok) {
    html += `<div class="empty-text">Could not load history — make sure you've created the bears_brief_completed_log table.</div>`;
  } else if (result.rows.length === 0) {
    html += `<div class="empty-text">Nothing completed yet matching that search.</div>`;
  } else {
    let lastDate = null;
    result.rows.forEach(row => {
      if (row.completed_date !== lastDate) {
        html += `<div class="quad-sub" style="margin-top:16px;margin-bottom:6px;">${formatLogDate(row.completed_date)}</div>`;
        lastDate = row.completed_date;
      }
      const tagColor = PROJECT_COLORS[row.tag] || (TAGS.find(t => t.key === row.tag) || {}).color || 'var(--muted)';
      html += `
        <div class="card" style="margin-bottom:8px;padding:12px 16px;">
          <div class="task-text">${esc(row.task_text)}</div>
          <span class="tag" style="background:${tagColor}">${esc(row.tag || row.source)}</span>
        </div>`;
    });
  }

  el.innerHTML = html;
  document.getElementById('history-search').addEventListener('keydown', e => { if (e.key === 'Enter') applyHistoryFilters(); });
}

function applyHistoryFilters() {
  const text = document.getElementById('history-search').value;
  const date = document.getElementById('history-date-input').value;
  loadHistoryTab(text, date);
}
